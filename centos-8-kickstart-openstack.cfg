#version=RHEL8
ignoredisk --only-use=sda,sdb
# Partition clearing information
clearpart --none --initlabel
# Use graphical install
text
# Use CDROM installation media
cdrom
# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'
# System language
lang en_US.UTF-8

network  --bootproto=dhcp --onboot=yes --noipv6 --activate
network  --bootproto=dhcp --onboot=yes --noipv6 --activate
network  --bootproto=dhcp --onboot=yes --noipv6 --activate
network  --bootproto=dhcp --onboot=yes --noipv6 --activate

network  --hostname=centos
repo --name="Minimal" --baseurl=file:///run/install/repo/Minimal
# Root password
rootpw {CENTOS_ROOT_PWD}
# Run the Setup Agent on first boot
firstboot --enable
# Do not configure the X Window System
skipx
# System services
services --enabled="chronyd"
# System timezone
timezone America/New_York --isUtc --ntpservers=192.168.1.1
# System bootloader configuration
bootloader --append=" crashkernel=auto" --location=mbr --boot-drive=sda
# autopart --type=lvm
# Partition clearing information
clearpart --all --initlabel
zerombr
part biosboot --size=1
part / --size=50000
part /home --size=30000
part /boot --size=30000
part swap --size=20000
part /HP-EXT --size=500000 --fstype=ext4
part /HP-Disk --size=1024 --grow --fstype=ext4
part /HP-SSD --fstype=ext4 --size=1024 --grow --ondisk=sdb

%packages
@core
-biosdevname
@^server-product-environment
kexec-tools
net-tools
curl
%end

%addon com_redhat_kdump --enable --reserve-mb='auto'

%end

%anaconda
pwpolicy root --minlen=6 --minquality=1 --notstrict --nochanges --notempty
pwpolicy user --minlen=6 --minquality=1 --notstrict --nochanges --emptyok
pwpolicy luks --minlen=6 --minquality=1 --notstrict --nochanges --notempty
%end

%post
exec 1>/tmp/init-install.log 2>&1

