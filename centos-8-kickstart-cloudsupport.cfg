#version=RHEL8
ignoredisk --only-use=sda
# Partition clearing information
clearpart --none --initlabel
# Use graphical install
text
# Use CDROM installation media
cdrom
# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'
# System language
lang en_US.UTF-8

# Network information !!! Docker does NOT work with IPv6, DO NOT ENABLE !!!!!
network  --bootproto=dhcp --device=ens192 --onboot=yes --noipv6 --activate
network  --bootproto=static --device=ens224 --onboot=yes --activate --noipv6 --ip=10.0.20.200 --nodefroute

network  --hostname=cloudsupport
repo --name="Minimal" --baseurl=file:///run/install/repo/Minimal
# Root password
rootpw {CENTOS_ROOT_PWD}
# Run the Setup Agent on first boot
firstboot --enable
# Do not configure the X Window System
skipx
# System services
services --enabled="chronyd"
# System timezone
timezone America/New_York --isUtc --ntpservers=192.168.1.1
# System bootloader configuration
bootloader --append=" crashkernel=auto" --location=mbr --boot-drive=sda
autopart --type=lvm
# Partition clearing information
clearpart --all --initlabel
zerombr

%packages
@core
-biosdevname
@^server-product-environment
kexec-tools
net-tools
curl
%end

%addon com_redhat_kdump --enable --reserve-mb='auto'

%end

%anaconda
pwpolicy root --minlen=6 --minquality=1 --notstrict --nochanges --notempty
pwpolicy user --minlen=6 --minquality=1 --notstrict --nochanges --emptyok
pwpolicy luks --minlen=6 --minquality=1 --notstrict --nochanges --notempty
%end

%post
exec 1>/tmp/init-install.log 2>&1

for FILE in /etc/sysconfig/network-scripts/*; do
    echo $FILE | sed "s:/etc/sysconfig/network-scripts/ifcfg-::g" | xargs ifup;
done

systemctl disable firewalld

yum update -y
yum -y install perl yum-utils cockpit wget git python3-devel python38 make ruby ruby-devel gcc-c++ mysql-devel nodejs mysql-server open-vm-tools

#Prep initial startup script
#Prep initial startup script
wget -O /tmp/vm_functions.sh -d https://mephmanx:{GITHUB_TOKEN}@raw.githubusercontent.com/mephmanx/openstack-scripts/master/vm_functions.sh
chmod 777 /tmp/vm_functions.sh

wget -O /etc/init.d/vmware-centos8.sh -d https://mephmanx:{GITHUB_TOKEN}@raw.githubusercontent.com/mephmanx/openstack-scripts/master/vmware-centos8-cloudsupport.sh
chmod 777 /etc/init.d/vmware-centos8.sh

chkconfig --add vmware-centos8.sh
chkconfig --level 2345 vmware-centos8.sh on
###############################

